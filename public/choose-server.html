<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Select Server — Economic Bomb</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #0e0e10; --surface: #18181b; --border: #27272a;
  --text: #fafafa; --muted: #71717a; --subtle: #3f3f46;
  --accent: #eab308; --accent-dim: rgba(234,179,8,0.12);
  --red: #ef4444; --green: #22c55e;
}
html { scroll-behavior: smooth; }
body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh; display: flex; flex-direction: column; }
a { text-decoration: none; color: inherit; }

nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 50;
  height: 60px; display: flex; align-items: center; justify-content: space-between;
  padding: 0 2rem;
  background: rgba(14,14,16,0.8); backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
}
.logo { display: flex; align-items: center; gap: 0.5rem; font-size: 0.95rem; font-weight: 600; letter-spacing: -0.01em; }
.logo img { height: 26px; width: 26px; object-fit: contain; border-radius: 5px; }
.logo-dot { color: var(--accent); }
.nav-right { display: flex; align-items: center; gap: 0.25rem; }
.user-pill { display: flex; align-items: center; gap: 0.5rem; font-size: 0.82rem; color: var(--muted); }
.user-pill img { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); }
.nav-link { padding: 0.4rem 0.75rem; border-radius: 6px; font-size: 0.85rem; font-weight: 500; color: var(--muted); transition: color 0.15s, background 0.15s; }
.nav-link:hover { color: var(--text); background: var(--surface); }

.page { flex: 1; padding: 6rem 2rem 4rem; max-width: 680px; margin: 0 auto; width: 100%; }
.page-eyebrow { display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.78rem; font-weight: 500; letter-spacing: 0.04em; color: var(--muted); border: 1px solid var(--border); border-radius: 100px; padding: 0.3rem 0.9rem; margin-bottom: 1.5rem; }
.page h1 { font-size: clamp(1.6rem, 4vw, 2.2rem); font-weight: 600; letter-spacing: -0.03em; margin-bottom: 0.5rem; }
.page h1 em { font-style: normal; color: var(--accent); }
.page-sub { font-size: 0.9rem; color: var(--muted); margin-bottom: 2.5rem; }

.server-grid { display: flex; flex-direction: column; gap: 0.6rem; }

.server-card {
  display: flex; align-items: center; gap: 1rem;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 1rem 1.25rem;
  cursor: pointer; transition: border-color 0.15s, background 0.15s;
}
.server-card:hover { border-color: var(--subtle); background: #1c1c1f; }
.server-card.has-bot:hover { border-color: var(--accent); }

.srv-avatar { width: 44px; height: 44px; border-radius: 10px; background: var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 1rem; font-weight: 700; overflow: hidden; }
.srv-avatar img { width: 100%; height: 100%; object-fit: cover; }

.srv-info { flex: 1; min-width: 0; }
.srv-name { font-size: 0.92rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.srv-meta { font-size: 0.75rem; color: var(--muted); margin-top: 0.1rem; }

.srv-action { margin-left: auto; flex-shrink: 0; }
.btn { display: inline-flex; align-items: center; gap: 0.4rem; padding: 0.45rem 1rem; border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.82rem; font-weight: 600; border: none; cursor: pointer; transition: opacity 0.15s, transform 0.15s; text-decoration: none; }
.btn:hover { opacity: 0.85; transform: translateY(-1px); }
.btn-fill { background: var(--accent); color: #000; }
.btn-outline { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
.btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }

.tag { display: inline-flex; align-items: center; gap: 0.3rem; font-size: 0.68rem; font-weight: 600; padding: 0.15rem 0.5rem; border-radius: 4px; }
.tag-green { background: rgba(34,197,94,0.1); color: var(--green); }
.tag-muted { background: var(--border); color: var(--muted); }

.loading { color: var(--muted); font-size: 0.85rem; padding: 3rem; text-align: center; }

footer {
  border-top: 1px solid var(--border);
  padding: 1.5rem 2rem;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem;
  font-size: 0.82rem; color: var(--muted);
}
.footer-logo { display: flex; align-items: center; gap: 0.5rem; font-weight: 600; font-size: 0.9rem; color: var(--text); }
.footer-logo img { height: 22px; width: 22px; object-fit: contain; border-radius: 4px; }
.footer-logo span { color: var(--accent); }
</style>
</head>
<body>

<nav>
  <a href="/" class="logo">
    <img src="economicbomb.webp" alt="Economic Bomb"/>
    Economic<span class="logo-dot"> Bomb</span>
  </a>
  <div class="nav-right">
    <div class="user-pill">
      <img id="userAvatar" src="" alt=""/>
      <span id="userName"></span>
    </div>
    <a href="/auth/logout" class="nav-link">Logout</a>
  </div>
</nav>

<div class="page">
  <div class="page-eyebrow">⚡ Server Select</div>
  <h1>Choose a <em>server.</em></h1>
  <p class="page-sub">Select a server you manage. Servers without the bot will prompt you to add it first.</p>
  <div class="server-grid" id="serverGrid">
    <div class="loading">Loading your servers...</div>
  </div>
</div>

<footer>
  <div class="footer-logo">
    <img src="economicbomb.webp" alt=""/>
    Economic<span> Bomb</span>
  </div>
  <span>© 2026 Economic Bomb</span>
</footer>

<script>
async function loadServers() {
  try {
    const [meRes, guildsRes] = await Promise.all([fetch('/api/me'), fetch('/api/guilds')]);
    const me = await meRes.json();
    const guilds = await guildsRes.json();

    document.getElementById('userAvatar').src = me.user?.avatar || '';
    document.getElementById('userName').textContent = me.user?.username || '';

    if (!guilds.length) {
      document.getElementById('serverGrid').innerHTML = `
        <div style="text-align:center;padding:3rem;color:var(--muted)">
          <div style="font-size:2rem;margin-bottom:1rem">😔</div>
          <div style="font-weight:600;color:var(--text);margin-bottom:0.5rem">No servers found</div>
          <div style="font-size:0.85rem">Add the bot to a server you admin first.</div>
          <a href="/invite" style="display:inline-block;margin-top:1.5rem" class="btn btn-fill">+ Add Economic Bomb</a>
        </div>
      `;
      return;
    }

    document.getElementById('serverGrid').innerHTML = guilds.map(g => {
      const iconHtml = g.icon
        ? `<img src="${g.icon}" alt="${g.name}"/>`
        : `<span>${g.name.charAt(0).toUpperCase()}</span>`;
      const isActive = me.guild?.id === g.id;
      return `
        <div class="server-card has-bot" onclick="selectServer('${g.id}', '${g.name.replace(/'/g, "\\'")}')">
          <div class="srv-avatar">${iconHtml}</div>
          <div class="srv-info">
            <div class="srv-name">${g.name}</div>
            <div class="srv-meta">
              <span class="tag tag-green">✓ Bot active</span>
              ${isActive ? '&nbsp;<span class="tag tag-muted">Current</span>' : ''}
            </div>
          </div>
          <div class="srv-action">
            <span class="btn ${isActive ? 'btn-outline' : 'btn-fill'}">${isActive ? 'Selected' : 'Open →'}</span>
          </div>
        </div>
      `;
    }).join('');
  } catch(e) {
    document.getElementById('serverGrid').innerHTML = '<div class="loading">Failed to load servers</div>';
  }
}

async function selectServer(id, name) {
  try {
    const res = await fetch('/api/switch-guild', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ guildId: id })
    });
    const d = await res.json();
    if (d.success) window.location = '/dashboard';
  } catch(e) {}
}

loadServers();
</script>
</body>
</html>
